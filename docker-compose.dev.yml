version: '3.8'

services:
  # 1. PostgreSQL Database Service
  postgres_db:
    image: postgres:16-alpine
    container_name: nestjs_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: mydbname
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  # 2. NestJS Backend Application Service (DEV MODE - hot reload)
  nestjs-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nestjs_backend_dev
    restart: always
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
    depends_on:
      - postgres_db
    env_file:
      - .env

    # কন্টেইনার চালু হওয়ার সময় prisma generate + migrate করে, তারপর dev server শুরু হয়
    command: >
      sh -c "npx prisma generate && 
             npx prisma migrate deploy && 
             pnpm run start:dev"

    # লোকাল কোড ফোল্ডার কন্টেইনারে মাউন্ট করা হচ্ছে - এইটাই hot reload-এর মূল চাবি
    volumes:
      - .:/app
      - /app/node_modules   # node_modules লোকাল থেকে override না হওয়ার জন্য

volumes:
  postgres_data_dev: